# A generic, single database configuration.

[alembic]
script_location = %(here)s/app/db/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = postgresql+asyncpg://dtsys:5e717eb5409af8a9941b42c93359aa8b@localhost:5432/dtsys

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
