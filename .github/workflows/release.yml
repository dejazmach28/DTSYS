name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build agent binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
      - name: Resolve version
        id: version
        run: echo "version=$(git describe --tags --abbrev=0 | sed 's/^v//')" >> "$GITHUB_OUTPUT"
      - name: Build release binaries
        run: bash scripts/build-release.sh
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-binaries
          path: dist/

  build-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-binaries
          path: dist/
      - name: Install WiX Toolset v4
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.UI.wixext
      - name: Build MSI
        shell: pwsh
        run: |
          $version = (Get-Content dist/version.txt -Raw).Trim()
          .\client\packaging\windows\build-msi.ps1 -Version $version
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-msi
          path: dist/*.msi

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-msi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all/
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-all/*
          generate_release_notes: true
          body: |
            ## Installation

            **Linux/macOS:**
            ```bash
            curl -fsSL https://your-server/install-agent.sh | sudo bash -s -- --server https://your-server --token TOKEN
            ```

            **Windows — MSI (recommended):**
            ```powershell
            msiexec /i dtsys-agent-${{ needs.build-binaries.outputs.version }}-windows-amd64.msi /qn DTSYS_SERVER=https://your-server DTSYS_TOKEN=TOKEN
            ```

            **Windows — PowerShell script:**
            ```powershell
            $env:DTSYS_SERVER="https://your-server"; $env:DTSYS_TOKEN="TOKEN"; irm https://your-server/install-agent.ps1 | iex
            ```
