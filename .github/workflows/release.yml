name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build release binaries
        run: bash scripts/build-release.sh
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            **Linux/macOS:**
            ```bash
            curl -fsSL https://your-server/install-agent.sh | sudo bash -s -- --server https://your-server --token TOKEN
            ```

            **Windows (PowerShell as Admin):**
            ```powershell
            $env:DTSYS_SERVER="https://your-server"; $env:DTSYS_TOKEN="TOKEN"; irm https://your-server/install-agent.ps1 | iex
            ```
