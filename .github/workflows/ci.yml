name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  agent:
    name: Go Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: client/go.sum
      - name: Build
        working-directory: client
        run: go build ./...
      - name: Vet
        working-directory: client
        run: go vet ./...
      - name: Test
        working-directory: client
        run: go test ./... -race -coverprofile=coverage.out
      - name: Vulnerability check
        working-directory: client
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Cross-compile
        working-directory: client
        run: |
          GOOS=linux   GOARCH=amd64  go build ./cmd/agent/
          GOOS=linux   GOARCH=arm64  go build ./cmd/agent/
          GOOS=darwin  GOARCH=amd64  go build ./cmd/agent/
          GOOS=darwin  GOARCH=arm64  go build ./cmd/agent/
          GOOS=windows GOARCH=amd64  go build ./cmd/agent/

  server:
    name: Python Server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: dtsys_test
          POSTGRES_USER: dtsys
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: server
        run: |
          pip install uv
          uv pip install -e ".[dev]" --system
      - name: Lint
        working-directory: server
        run: .venv/bin/ruff check app/ tests/ || ruff check app/ tests/
      - name: Test
        working-directory: server
        env:
          DATABASE_URL: postgresql+asyncpg://dtsys:testpassword@localhost:5432/dtsys_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test
        run: .venv/bin/pytest tests/ -v --tb=short
      - name: Security audit
        working-directory: server
        run: |
          pip install pip-audit
          pip-audit

  frontend:
    name: React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=high

  release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: [agent, server, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build all binaries
        run: bash scripts/build-release.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dtsys-agent-binaries
          path: dist/
          retention-days: 30
