services:
  postgres:
    image: postgres:16
    container_name: dtsys-dev-postgres
    environment:
      POSTGRES_DB: dtsys
      POSTGRES_USER: dtsys
      POSTGRES_PASSWORD: dtsys
    ports:
      - "5432:5432"
    volumes:
      - dtsys_dev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtsys -d dtsys"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: dtsys-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - dtsys_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: dtsys-dev-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dtsys.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dtsys-dev-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  dtsys_dev_postgres:
  dtsys_dev_redis:
